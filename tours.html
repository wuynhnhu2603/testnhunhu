    <script>
        function logout() {
    localStorage.removeItem("user");
    window.location.href = "home.html";
}


const user = JSON.parse(localStorage.getItem("user"));

if(!user) {
    alert("Bạn cần đăng nhập!");

}


        const menu = document.querySelector('#mobile-menu');

            navList.classList.toggle('active');
            menu.classList.toggle('is-active');

    </script>
 <main class="container" style="background-color: rgba(9, 109, 76, 0.559);">
 <div class="tour-all">
            <h1>DANH SÁCH TOURS DU LỊCH 🌍</h1>

        <div class="controls">
            <div class="control">
                <label>Tìm tour</label>
                <input type="text" id="searchInput" placeholder="Nhập tên hoặc địa điểm...">
            </div>

            <div class="control">
                <label>Loại tour</label>
                <select id="categoryFilter">
      <option value="all">Tất cả</option>
      <option value="biển">Vùng Biển</option>
      <option value="núi">Vùng Núi phía Bắc</option>
      <option value="văn hóa">Khám phá Văn hóa</option>
      <option value="đồng bằng">Vùng Đồng bằng</option>
    </select>
            </div>

            <div class="control">
                <label>Thời gian</label>
                <select id="durationFilter">
      <option value="all">Tất cả</option>
      <option value="2 ngày 1 đêm">2 ngày 1 đêm</option>
      <option value="3 ngày 2 đêm">3 ngày 2 đêm</option>
      <option value="4 ngày 3 đêm">4 ngày 3 đêm</option>
    </select>
            </div>
        </div>

        <div class="grid" id="tourGrid"></div>

        <script>
            fetch('database.json')
                .then(res => res.json())
                .then(data => {
                    tours = data;
                    render(tours);
                });
            let tours = [];

            function formatPrice(p) {
                return p.toLocaleString('vi-VN') + ' ₫';
            }

            function render(data) {
                const grid = document.getElementById('tourGrid');
                grid.innerHTML = data.map(t => `
    <div class="card" onclick="goDetail(${t.id})">
      <img src="${t.image}" alt="">
      <div class="card-body">
        <div class="title">${t.name}</div>
        <div class="price">${formatPrice(t.price)}</div>
        <div class="location">📍 ${t.location}</div>
        <div class="duration">⏰ ${t.duration}</div>
      </div>
    </div>
  `).join('');
            }

            function filter() {
                const text = document.getElementById('searchInput').value.toLowerCase();
                const cate = document.getElementById('categoryFilter').value;
                const dura = document.getElementById('durationFilter').value;

                const result = tours.filter(t =>
                    (cate === 'all' || t.category === cate) &&
                    (dura === 'all' || t.duration === dura) &&
                    (t.name.toLowerCase().includes(text) ||
                        t.location.toLowerCase().includes(text))
                );

                render(result);
            }

            function goDetail(id) {
                window.location.href = `detail.html?id=${id}`;
            }

            document.getElementById('searchInput').addEventListener('input', filter);
            document.getElementById('categoryFilter').addEventListener('change', filter);
            document.getElementById('durationFilter').addEventListener('change', filter);

            fetch('../database.json')
                .then(res => res.json())
                .then(data => {
                    tours = data;
                    render(tours);
                });
        </script>
        </div>
</main>
