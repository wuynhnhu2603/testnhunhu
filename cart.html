<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - ViVu Việt</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../static/home.css">
    <link rel="stylesheet" href="../static/cart.css">
    
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function ConfirmModal({ isOpen, onClose, onConfirm, tourName }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[9999] p-4">
                    <div className="bg-white rounded-[24px] p-8 max-w-sm w-full text-center shadow-2xl">
                        <div className="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500 text-2xl">
                            <i className="fa-solid fa-trash-can"></i>
                        </div>
                        <h3 className="text-xl font-bold mb-2">Xóa tour này?</h3>
                        <p className="text-gray-500 mb-6 text-sm">Bạn có chắc muốn bỏ <br/><span className="font-bold text-slate-700">{tourName}</span>?</p>
                        <div className="flex gap-3">
                            <button onClick={onClose} className="flex-1 py-3 rounded-xl bg-gray-100 font-bold text-gray-600">Hủy</button>
                            <button onClick={onConfirm} className="flex-1 py-3 rounded-xl bg-red-500 font-bold text-white shadow-lg">Xóa ngay</button>
                        </div>
                    </div>
                </div>
            );
        }

        function CartApp() {
            const [cart, setCart] = useState([]);
            const [modal, setModal] = useState({ open: false, id: null, name: '' });

            useEffect(() => {
                const data = JSON.parse(localStorage.getItem('cart')) || [];
                if(data.length === 0) {
                    setCart([{
                        id: 1,
                        name: "Đà Lạt 3N2Đ - Thành phố Ngàn Hoa",
                        price: 2200000,
                        image: "../images/dalat.jpg", 
                        location: "Lâm Đồng",
                        duration: "3 ngày 2 đêm",
                        quantity: 3
                    }]);
                } else {
                    setCart(data);
                }
            }, []);

            const totalPrice = useMemo(() => cart.reduce((acc, item) => acc + (item.price * item.quantity), 0), [cart]);

            const updateQty = (id, delta) => {
                const newCart = cart.map(item => 
                    item.id === id ? { ...item, quantity: Math.max(1, item.quantity + delta) } : item
                );
                setCart(newCart);
                localStorage.setItem('cart', JSON.stringify(newCart));
            };

            const confirmDelete = () => {
                const newCart = cart.filter(item => item.id !== modal.id);
                setCart(newCart);
                localStorage.setItem('cart', JSON.stringify(newCart));
                setModal({ open: false, id: null, name: '' });
            };

            return (
                <div className="min-h-screen bg-[#f8fafc] flex flex-col">
    
                    <header className="navbar-container">
                        <nav className="navbar">
                            <div className="nav-left">
                                <img className="logo" src="https://github.com/wuynhnhu2603/web-du-lich/blob/Nhu/images/logo.png?raw=true" alt="Logo" />
                                <h2 className="logo-text-group">ViVu Việt</h2>
                            </div>
                            <ul className="nav-center">
                                <li><a href="home.html" className="nav-a">Home</a></li>
                                <li><a href="tours.html" className="nav-a">Tours</a></li>
                                <li><a href="#" className="nav-a active">Cart</a></li>
                                <li><a href="about.html" className="nav-a">About Us</a></li>
                                <li><a href="#" className="nav-a">Login</a></li>
                            </ul>
                        </nav>
                    </header>

  
                    <main className="flex-grow max-w-6xl mx-auto w-full px-4 py-8">
                        <h1 className="text-3xl font-bold text-slate-800 mb-10 px-6">Thông tin đặt chỗ</h1>
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                            <div className="lg:col-span-8 space-y-6">
                                {cart.length === 0 ? (
                                    <div className="bg-white p-20 text-center text-gray-400 font-medium rounded-3xl">Giỏ hàng đang trống</div>
                                ) : cart.map(item => (
                                    <div key={item.id} className="bg-white p-6 flex flex-col md:flex-row gap-6 items-center rounded-[30px] shadow-sm border border-gray-50">
                                        <img src={item.image} className="w-full md:w-44 h-32 object-cover rounded-2xl" />
                                        <div className="flex-1 w-full">
                                            <h3 className="text-lg font-bold text-slate-800 mb-1">{item.name}</h3>
                                            <div className="flex gap-4 text-[11px] text-gray-400 mb-5">
                                                <span><i className="fa-regular fa-clock mr-1 text-[#4b954b]"></i>{item.duration}</span>
                                                <span><i className="fa-solid fa-location-dot mr-1 text-[#4b954b]"></i>{item.location}</span>
                                            </div>
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center border rounded-full px-2 py-1 bg-gray-50 border-gray-100">
                                                    <button onClick={() => updateQty(item.id, -1)} className="p-2 text-gray-400 hover:text-[#4b954b]"><i className="fa-solid fa-minus text-[10px]"></i></button>
                                                    <span className="w-8 text-center font-bold text-slate-700">{item.quantity}</span>
                                                    <button onClick={() => updateQty(item.id, 1)} className="p-2 text-gray-400 hover:text-[#4b954b]"><i className="fa-solid fa-plus text-[10px]"></i></button>
                                                </div>
                                                <button onClick={() => setModal({open: true, id: item.id, name: item.name})} className="text-gray-300 hover:text-red-500">
                                                    <i className="fa-solid fa-trash-can"></i>
                                                </button>
                                            </div>
                                        </div>
                                        <div className="md:text-right w-full md:w-auto">
                                            <p className="text-2xl font-bold text-[#4b954b]">{(item.price * item.quantity).toLocaleString()}đ</p>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="lg:col-span-4">
                                <div className="bg-white p-8 sticky top-28 rounded-[30px] shadow-sm border border-gray-50">
                                    <h2 className="text-lg font-bold mb-6 pb-4 border-b border-gray-100">Tóm tắt chuyến đi</h2>
                                    <div className="flex justify-between items-end border-t border-dashed border-gray-200 pt-6 mb-8">
                                        <span className="font-bold text-slate-800">Tổng cộng</span>
                                        <p className="text-3xl font-black text-[#4b954b]">{totalPrice.toLocaleString()}đ</p>
                                    </div>
                                    <button className="w-full bg-[#4b954b] text-white py-4 rounded-2xl font-bold text-lg">
                                        Thanh toán ngay
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                 
                    <div className="px-8 pb-4">
                        <footer className="footer">
                            <div className="footer_1">
                                <img className="logo" src="https://github.com/wuynhnhu2603/web-du-lich/blob/Nhu/images/logo.png?raw=true" alt="Logo" />
                                <h3 className="ml-3 font-bold text-xl">ViVu Việt</h3> 
                                <div className="social-links">
                                    <a href="#" className="social-items"><i className="fa-brands fa-facebook-f"></i></a>
                                    <a href="#" className="social-items"><i className="fa-brands fa-instagram"></i></a>
                                    <a href="#" className="social-items"><i className="fa-brands fa-x-twitter"></i></a>
                                    <a href="#" className="social-items"><i className="fa-brands fa-youtube"></i></a>
                                </div>
                            </div>
                            <div className="contact">
                                <h3 className="font-bold mb-2">CONTACT</h3>
                                <p>Địa chỉ: P613, tòa A2, Đại học Kinh tế Quốc dân.</p>
                                <p>Hotline: 0123456789</p>
                                <p>Email: abcd1234@gmail.com</p>
                            </div>
                            <div className="footer_3">
                                <p>© Bản quyền thuộc về Nhóm 4</p>
                                <p>Có thắc mắc? Đừng liên hệ!</p>
                            </div>
                        </footer>
                    </div>

                    <ConfirmModal isOpen={modal.open} onClose={() => setModal({open: false})} onConfirm={confirmDelete} tourName={modal.name} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CartApp />);
    </script>
</body>
</html>
